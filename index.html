<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src.css" />
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather&family=Montserrat&family=Playfair+Display&family=Roboto&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
    />
    <script src="script.js" defer></script>
    <title>Amogelang Mabonela | AI Engineer</title>
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <div class="navbar-left">
        <a href="#about" class="navbar-name">Amogelang Mabonela</a>
      </div>
      <span class="material-icons toggle-icon" id="theme-toggle"
        >brightness_4</span
      >
      <div class="navbar-right">
        <a href="#hero">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
      </div>
    </div>

    <!-- Hero -->
    <section id="hero" class="hero">
      <h1>AI Engineer</h1>
      <img
        src="Gallery/20241215_074048.jpg"
        alt="Amogelang Mabonela"
        class="hero-image"
      />
      <p class="hero-bio">
        Hello! I’m an AI engineer with hands-on experience in JavaScript, React,
        Node.js, and MongoDB...
      </p>
      <button class="connect-button">
        <a href="#contact" class="connect-link">Let's Connect</a>
      </button>
    </section>

    <!-- About -->
    <section id="about" class="about">
      <!-- your about content -->
    </section>

    <!-- Skills -->
    <section id="skills" class="skills">
      <!-- your skills content -->
    </section>

    <!-- Portfolio -->
    <section id="portfolio" class="portfolio">
      <!-- your portfolio content -->
    </section>

    <!-- Contact -->
    <section id="contact" class="contact">
      <!-- your contact content -->
    </section>

    <!-- Chatbot Widget -->
    <div id="chatbot-widget">
      <div id="chatbot-button">
        <img src="Gallery/20241215_074048.jpg" alt="Avatar" />
      </div>
      <div id="chatbox" class="hidden">
        <div id="chatbox-header">
          <span>Chat with AmoBot</span>
          <button id="close-chat">&times;</button>
        </div>
        <div id="chatbox-body"></div>
        <div id="chatbox-input">
          <input type="text" id="user-input" placeholder="Type a message..." />
          <button id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </body>
</html>
